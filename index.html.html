<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">وجهتي - دليلك السياحي في الإمارات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- لوحة الألوان الفاخرة والتحديثات العامة --- */
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        
        :root {
            --primary-glow: #D4AF37;
            --secondary-dark: #0f2e1a;
            --accent-neon: #e74c3c;
            --dark-surface: #111827;
            --light-surface: #ffffff;
            --bg-global: #0b0f17; 
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-global);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        /* --- الهيدر الزجاجي المطور بنمط علم الإمارات --- */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 85px;
            display: flex;
            align-items: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(11, 15, 23, 0.75);
            border-bottom: 2px solid;
            border-image: linear-gradient(to right, #007A4D, #FFFFFF, #000000, #CE1126) 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .header-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #FFF 30%, var(--primary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            position: relative;
        }
        .logo::after {
            content: '';
            position: absolute;
            bottom: -5px;
            right: 0;
            width: 35px;
            height: 3px;
            background: var(--primary-glow);
            border-radius: 2px;
        }
        nav ul { list-style: none; display: flex; gap: 2.5rem; align-items: center; }
        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            position: relative;
            padding: 0.5rem 0;
        }
        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary-glow);
            transition: width 0.3s ease;
        }
        nav a:hover::after { width: 100%; }
        nav a:hover { color: var(--primary-glow); }
        .lang-btn {
            background: linear-gradient(135deg, var(--primary-glow), #bfa030);
            color: #000;
            border: none;
            padding: 0.6rem 1.6rem;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
        .lang-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
            background: #fff;
            color: var(--bg-global);
        }

        /* --- قسم الـ Hero والبحث المتطور --- */
        .hero {
            background: radial-gradient(circle at 50% 20%, rgba(26, 71, 42, 0.4) 0%, rgba(11, 15, 23, 1) 70%);
            padding: 9rem 2rem 7rem 2rem;
            text-align: center;
            position: relative;
        }
        .hero h1 {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
            background: linear-gradient(to left, #ffffff, var(--primary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .hero p {
            font-size: 1.3rem;
            margin-bottom: 3rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .search-box {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 0.6rem;
            border-radius: 60px;
            display: flex;
            gap: 0.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid var(--glass-border);
        }
        .search-box select, .search-box input {
            border: none;
            outline: none;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            color: #fff;
            padding: 0.8rem 1.5rem;
            background: transparent;
            flex: 1;
        }
        .search-box select option { background-color: var(--bg-global); color: #fff; }
        .search-box input::placeholder { color: #888; }
        .search-box select { border-left: 1px solid var(--glass-border); }
        html[dir="ltr"] .search-box select { border-left: none; border-right: 1px solid var(--glass-border); }
        .search-box button {
            background: linear-gradient(135deg, var(--primary-glow), #bfa030);
            color: #000;
            border: none;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
        }

        /* --- أزرار الفلترة التصنيفية --- */
        .filter-section { padding: 1rem 2rem; margin: 2rem auto; max-width: 1400px; }
        .filter-buttons { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
        .filter-btn {
            padding: 0.7rem 1.6rem;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-main);
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        .filter-btn.active, .filter-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
            transform: translateY(-2px);
        }

        /* --- شبكة البطاقات الفاخرة --- */
        .destinations-container { max-width: 1400px; margin: 0 auto 4rem auto; padding: 0 2rem; }
        .destinations-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 2.5rem; }
        
        /* جعل البطاقة بالكامل قابلة للضغط ومؤثر الهوفر الهادئ */
        .destination-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }
        .destination-card:hover {
            transform: translateY(-8px);
            border-color: rgba(214, 175, 55, 0.4);
            box-shadow: 0 20px 40px rgba(214, 175, 55, 0.1);
        }

        /* تصميم بطاقة العلم المدمجة بالرموز بدلاً من الصور التالفة */
        .flag-card-bg {
            width: 100%;
            height: 180px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.5));
        }
        .flag-red { position: absolute; top: 0; left: 0; bottom: 0; width: 25%; background: #CE1126; }
        html[dir="rtl"] .flag-red { left: auto; right: 0; }
        .flag-stripes { position: absolute; top: 0; bottom: 0; left: 25%; right: 0; display: flex; flex-direction: column; }
        html[dir="rtl"] .flag-stripes { left: 0; right: 25%; }
        .stripe-green { flex: 1; background: #007A4D; }
        .stripe-white { flex: 1; background: #FFFFFF; }
        .stripe-black { flex: 1; background: #000000; }
        
        .flag-icon {
            position: relative;
            z-index: 5;
            font-size: 3.2rem;
            background: rgba(11, 15, 23, 0.85);
            backdrop-filter: blur(10px);
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 2px solid var(--primary-glow);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        .card-content { padding: 1.8rem; flex-grow: 1; display: flex; flex-direction: column; }
        .emirate-badge {
            display: inline-block;
            background: rgba(214, 175, 55, 0.15);
            color: var(--primary-glow);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            width: fit-content;
            border: 1px solid rgba(214, 175, 55, 0.2);
        }
        .card-title { font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: 0.6rem; }
        .card-description { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem; flex-grow: 1; }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1.2rem;
            border-top: 1px solid var(--glass-border);
            margin-top: auto;
        }
        .view-btn {
            background: transparent;
            color: #fff;
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
            pointer-events: none; /* لتمرير الضغط إلى البطاقة بالكامل */
        }
        .destination-card:hover .view-btn { background: #fff; color: #000; border-color: #fff; }
        .location-info { font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.4rem; }

        /* --- إحصائيات أسفل الصفحة --- */
        .emirates-info {
            background: linear-gradient(135deg, #09190f 0%, var(--bg-global) 100%);
            border-top: 1px solid var(--glass-border);
            padding: 4rem 2rem;
            text-align: center;
        }
        .emirates-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 2rem; }
        .emirate-item { background: rgba(255,255,255,0.02); padding: 1.5rem; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .emirate-item:hover { background: rgba(255,255,255,0.05); border-color: var(--primary-glow); }
        .emirate-item h3 { color: var(--primary-glow); margin-bottom: 0.5rem; font-size: 1.3rem; font-weight: 700; }
        .emirate-item p { font-size: 0.9rem; color: var(--text-muted); }
        
        footer { background: #06090e; color: var(--text-muted); padding: 2rem; text-align: center; font-size: 0.9rem; border-top: 1px solid var(--glass-border); }

        /* --- النافذة المنبثقة الفاخرة المحدثة --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(6, 9, 14, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            overflow-y: auto;
            padding: 2rem 1rem;
        }
        .modal-content {
            background: #111622;
            border: 1px solid var(--glass-border);
            margin: 5% auto;
            padding: 2.5rem;
            border-radius: 28px;
            width: 100%;
            max-width: 750px;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }
        .close { color: var(--text-muted); position: absolute; top: 1.5rem; left: 2rem; font-size: 2.2rem; font-weight: 300; cursor: pointer; }
        html[dir="ltr"] .close { left: auto; right: 2rem; }
        .close:hover { color: var(--accent-neon); }
        .modal-emirate { display: inline-block; background: var(--primary-glow); color: #000; padding: 0.4rem 1.2rem; border-radius: 30px; font-weight: 700; font-size: 0.85rem; margin-bottom: 1rem; }
        .modal h2 { color: #fff; font-size: 2rem; font-weight: 900; margin-bottom: 0.8rem; }
        .modal-category { font-weight: 600; color: var(--primary-glow); margin-bottom: 1.5rem; font-size: 1rem; }
        .modal-description { color: #d1d5db; line-height: 1.8; margin-bottom: 2rem; font-size: 1.05rem; }
        .modal-activities, .modal-location { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 1.5rem; border-radius: 16px; margin-bottom: 1.5rem; }
        .modal-activities h4, .modal-location h4 { color: #fff; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.6rem; font-size: 1.1rem; }
        .modal-activities ul { list-style: none; }
        .modal-activities li { padding: 0.4rem 0; display: flex; align-items: center; gap: 0.6rem; color: #e5e7eb; }
        .modal-activities li::before { content: " ✦ "; color: var(--primary-glow); font-weight: bold; }
        .maps-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: linear-gradient(135deg, #007A4D, #005a38);
            color: white;
            padding: 0.8rem 1.6rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 0.5rem;
            box-shadow: 0 4px 15px rgba(0, 122, 77, 0.3);
        }
        .maps-btn:hover { background: #fff; color: #000; transform: translateY(-2px); }

        @media (max-width: 768px) {
            header { height: auto; padding: 1.5rem 0; }
            .header-container { flex-direction: column; gap: 1.5rem; text-align: center; }
            nav ul { gap: 1.5rem; }
            .hero h1 { font-size: 2.5rem; }
            .search-box { flex-direction: column; border-radius: 24px; padding: 1rem; }
            .search-box select { border-left: none; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.8rem; }
            .search-box button { width: 100%; padding: 1rem; }
            .modal-content { padding: 1.5rem; }
        }
    </style>
</head>

            <nav>
                <ul>

            { id: 70, emirate: { ar: "الفجيرة", en: "Fujairah" }, category: { ar: "طبيعة وشواطئ", en: "Nature & Beaches" }, emoji: "🛶", name: { ar: "حديقة سد الرفيصة", en: "Al Rafisah Dam Oasis" }, desc: { ar: "سد مائي رائع تحيط به الجبال الشاهقة ويضم استراحة مجهزة بالكامل ومسارات مشي وقوارب مائية رائعة.", en: "A spectacular dam reservoir tucked inside high mountains, featuring modern rest areas and boating." }, activities: { ar: ["استئجار قوارب التجديف المائية والقيام بجولة في البحيرة الساحرة", "المشي في المسارات الجبلية وإطعام البط المقيم في البحيرة"], en: ["Rent paddleboats for a scenic tour on the placid lake", "Hike the paved mountain tracks and feed resident ducks"] }, location: { ar: "طريق الشارقة - خورفكان، الفجيرة", en: "Sharjah-Khorfakkan Rd, Fujairah" }, maps: "https://maps.google.com/?q=Al+Rafisah+Dam" }
        ];

        // تهيئة التطبيق وتوليد الواجهات ذكياً وثنائياً بلغة الاختيار
        function updateUI() {
            document.getElementById('pageTitle').innerText = translations[currentLang].title;
            document.getElementById('logoText').innerText = translations[currentLang].logo;
            document.getElementById('navHome').innerText = translations[currentLang].home;
            document.getElementById('navDestinations').innerText = translations[currentLang].destinations;
            document.getElementById('heroTitle').innerText = translations[currentLang].heroTitle;
            document.getElementById('heroDesc').innerText = translations[currentLang].heroDesc;
            document.getElementById('searchInput').placeholder = translations[currentLang].searchPlaceholder;
            document.getElementById('searchBtn').innerText = translations[currentLang].searchBtn;
            document.getElementById('footerText').innerText = translations[currentLang].footer;
            
            document.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            
            buildFilters();
            buildEmiratesSummary();
            filterDestinations();
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.querySelector('.lang-btn').innerText = currentLang === 'ar' ? 'English' : 'العربية';
            updateUI();
        }

        function buildFilters() {
            const emirates = [...new Set(destinationsData.map(d => d.emirate[currentLang]))];
            const select = document.getElementById('emirateFilter');
            select.innerHTML = `<option value="all">${translations[currentLang].allEmirates}</option>`;
            emirates.forEach(em => {
                select.innerHTML += `<option value="${em}">${em}</option>`;
            });

            const categories = [...new Set(destinationsData.map(d => d.category[currentLang]))];
            const filterContainer = document.getElementById('categoryFilterContainer');
            filterContainer.innerHTML = `<button class="filter-btn active" onclick="filterByCategory('all', this)">${translations[currentLang].allCat}</button>`;
            categories.forEach(cat => {
                filterContainer.innerHTML += `<button class="filter-btn" onclick="filterByCategory('${cat}', this)">${cat}</button>`;
            });
        }

        let selectedCategory = 'all';

        function filterByCategory(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedCategory = cat;
            filterDestinations();
        }

        // فلترة الوجهات وعرض البطاقات بالكامل مع ربط حدث الضغط المباشر بالبطاقة
        function filterDestinations() {
            const emirateValue = document.getElementById('emirateFilter').value;
            const searchValue = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('destinationsGrid');
            grid.innerHTML = '';

            const filtered = destinationsData.filter(dest => {
                const matchEmirate = emirateValue === 'all' || dest.emirate[currentLang] === emirateValue;
                const matchCategory = selectedCategory === 'all' || dest.category[currentLang] === selectedCategory;
                const matchSearch = dest.name[currentLang].toLowerCase().includes(searchValue) || 
                                    dest.desc[currentLang].toLowerCase().includes(searchValue);
                return matchEmirate && matchCategory && matchSearch;
            });

            filtered.forEach(dest => {
                // تصميم فخم وعصري بدون صور خارجية عشوائية بل ببطاقة العلم الذكية ورمز المعلم
                const card = document.createElement('div');
                card.className = 'destination-card';
                card.setAttribute('onclick', `openModal(${dest.id})`); // ميزة الضغط على البطاقة بالكامل لفتح النافذة
                
                card.innerHTML = `
                    <div class="flag-card-bg">
                        <div class="flag-red"></div>
                        <div class="flag-stripes">
                            <div class="stripe-green"></div>
                            <div class="stripe-white"></div>
                            <div class="stripe-black"></div>
                        </div>
                        <div class="flag-icon">${dest.emoji}</div>
                    </div>
                    <div class="card-content">
                        <span class="emirate-badge">${dest.emirate[currentLang]}</span>
                        <h3 class="card-title">${dest.name[currentLang]}</h3>
                        <p class="card-description">${dest.desc[currentLang]}</p>
                        <div class="card-footer">
                            <span class="location-info"><i class="fas fa-map-marker-alt"></i> ${dest.category[currentLang]}</span>
                            <button class="view-btn">${translations[currentLang].viewBtn}</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function buildEmiratesSummary() {
            const container = document.getElementById('emiratesGridSummary');
            container.innerHTML = '';
            const emiratesList = currentLang === 'ar' ? 
                ["أبوظبي", "دبي", "الشارقة", "عجمان", "أم القيوين", "رأس الخيمة", "الفجيرة"] :
                ["Abu Dhabi", "Dubai", "Sharjah", "Ajman", "Umm Al Quwain", "Ras Al Khaimah", "Fujairah"];
            
            emiratesList.forEach(em => {
                const count = destinationsData.filter(d => d.emirate[currentLang] === em).length;
                container.innerHTML += `
                    <div class="emirate-item">
                        <h3>${em}</h3>
                        <p>${count} ${translations[currentLang].destSuffix}</p>
                    </div>
                `;
            });
        }

        // فتح النافذة المنبثقة وعرض الأنشطة والموقع الجغرافي الفعلي للموقع
        function openModal(id) {
            const dest = destinationsData.find(d => d.id === id);
            if(!dest) return;

            document.getElementById('modalEmirateText').innerText = dest.emirate[currentLang];
            document.getElementById('modalTitle').innerText = dest.name[currentLang];
            document.getElementById('modalCategory').innerText = dest.category[currentLang];
            document.getElementById('modalDescription').innerText = dest.desc[currentLang];
            
            document.getElementById('modalActTitle').innerHTML = `<i class="fas fa-tasks"></i> ${translations[currentLang].actTitle}`;
            document.getElementById('modalLocTitle').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${translations[currentLang].locTitle}`;
            document.getElementById('modalMapsBtnText').innerText = translations[currentLang].mapsBtn;
            
            const actList = document.getElementById('modalActivities');
            actList.innerHTML = '';
            dest.activities[currentLang].forEach(act => {
                actList.innerHTML += `<li>${act}</li>`;
            });
            document.getElementById('modalLocation').innerText = dest.location[currentLang];
            document.getElementById('mapsLink').href = dest.maps;
            
            document.getElementById('destinationModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('destinationModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('destinationModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        window.onload = updateUI;
    </script>
</body>
</html>
