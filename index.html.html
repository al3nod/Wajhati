<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">وجهتي - دليلك السياحي في الإمارات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-color: #D4AF37;
            --secondary-color: #1a472a;
            --accent-color: #e74c3c;
            --text-dark: #2c3e50;
            --text-light: #ecf0f1;
            --bg-light: #f5f5f5;
            --bg-white: #ffffff;
            --border-color: #ddd;
        }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-light); color: var(--text-dark); line-height: 1.6; overflow-x: hidden; }
        
        /* --- تعديل الهيدر بالكامل ليصبح كخلفية علم الإمارات --- */
        header { 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.25); 
            height: 90px;
            display: flex;
            align-items: center;
            overflow: hidden;
            background: #fff; /* لون احتياطي */
        }
        
        /* محاكاة علم الإمارات بدقة في الخلفية */
        header::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        /* في وضع الـ RTL (العربية): الأحمر على اليمين الأقصى، وباقي الألوان تمتد لليسار */
        html[dir="rtl"] header::before {
            background: 
                linear-gradient(to bottom, #007A4D 0%, #007A4D 33.33%, #FFFFFF 33.33%, #FFFFFF 66.66%, #000000 66.66%, #000000 100%) no-repeat left center / 82% 100%,
                linear-gradient(to right, #CE1126 0%, #CE1126 100%) no-repeat right center / 18% 100%;
        }
        /* في وضع الـ LTR (الإنجليزية): الأحمر على اليسار الأقصى، وباقي الألوان تمتد لليمين */
        html[dir="ltr"] header::before {
            background: 
                linear-gradient(to bottom, #007A4D 0%, #007A4D 33.33%, #FFFFFF 33.33%, #FFFFFF 66.66%, #000000 66.66%, #000000 100%) no-repeat right center / 82% 100%,
                linear-gradient(to right, #CE1126 0%, #CE1126 100%) no-repeat left center / 18% 100%;
        }

        .header-container { 
            width: 100%;
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 0 2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: relative; 
            z-index: 2; 
        }
        
        /* تمييز الخطوط لتظهر بوضوح فوق ألوان العلم المختلفة */
        .logo { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.5rem; 
            font-weight: 900; 
            color: var(--primary-color); 
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8), -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        
        nav ul { list-style: none; display: flex; gap: 2rem; align-items: center; }
        nav a { 
            color: white; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 1.15rem;
            transition: color 0.3s ease; 
            text-shadow: 1px 1px 4px rgba(0,0,0,0.9), -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        /* جعل نصوص القائمة تتكيف تباينياً حسب جهة العلم (فوق الخلفية الغامقة) */
        html[dir="rtl"] nav a {
            color: #ffffff;
        }
        nav a:hover { color: var(--primary-color); }
        
        .lang-btn { 
            background: var(--primary-color); 
            color: #000000; 
            border: 2px solid #000000; 
            padding: 0.5rem 1.4rem; 
            border-radius: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            font-family: 'Cairo', sans-serif; 
            transition: all 0.3s ease; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .lang-btn:hover { background: white; color: var(--secondary-color); transform: scale(1.05); }

        /* باقي عناصر الصفحة */
        .hero { background: linear-gradient(135deg, var(--secondary-color) 0%, #0d3a1a 50%, #1a472a 100%); color: white; padding: 5rem 2rem; text-align: center; position: relative; }
        .hero h1 { font-size: 3.5rem; font-weight: 900; margin-bottom: 1rem; color: var(--primary-color); text-shadow: 3px 3px 6px rgba(0,0,0,0.5); }
        .hero p { font-size: 1.3rem; margin-bottom: 2rem; opacity: 0.9; }
        
        .search-box { background: white; padding: 0.8rem; border-radius: 50px; display: flex; gap: 1rem; box-shadow: 0 8px 25px rgba(0,0,0,0.2); max-width: 700px; margin: 0 auto; flex-wrap: wrap; }
        .search-box input, .search-box select { border: none; outline: none; font-size: 1rem; font-family: 'Cairo', sans-serif; color: var(--text-dark); padding: 0.5rem; flex: 1; min-width: 150px; }
        .search-box button { background: var(--secondary-color); color: white; border: none; padding: 0.5rem 2rem; border-radius: 50px; cursor: pointer; font-weight: 600; transition: background 0.3s ease; font-family: 'Cairo', sans-serif; }
        .search-box button:hover { background: var(--accent-color); }

        .filter-section { background: white; padding: 1.5rem; margin: 2rem auto; max-width: 1400px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .filter-buttons { display: flex; gap: 0.8rem; flex-wrap: wrap; justify-content: center; }
        .filter-btn { padding: 0.6rem 1.3rem; border: 2px solid var(--border-color); background: white; color: var(--text-dark); border-radius: 25px; cursor: pointer; font-weight: 500; transition: all 0.3s ease; font-family: 'Cairo', sans-serif; }
        .filter-btn.active, .filter-btn:hover { background: var(--secondary-color); color: white; border-color: var(--secondary-color); }

        .destinations-container { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; }
        .destinations-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 2rem; }
        
        .destination-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.08); transition: all 0.3s ease; cursor: pointer; display: flex; flex-direction: column; height: 100%; }
        .destination-card:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(0,0,0,0.15); }
        
        .flag-card-bg { width: 100%; height: 180px; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #fff; border-bottom: 4px solid var(--primary-color); }
        .flag-red { position: absolute; top: 0; left: 0; bottom: 0; width: 25%; background-color: #CE1126; }
        html[dir="rtl"] .flag-red { left: auto; right: 0; }
        .flag-stripes { position: absolute; top: 0; bottom: 0; left: 25%; right: 0; display: flex; flex-direction: column; }
        html[dir="rtl"] .flag-stripes { left: 0; right: 25%; }
        .stripe-green { flex: 1; background-color: #007A4D; }
        .stripe-white { flex: 1; background-color: #FFFFFF; }
        .stripe-black { flex: 1; background-color: #000000; }
        .flag-icon { position: relative; z-index: 5; font-size: 3.2rem; background: rgba(255, 255, 255, 0.9); width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }

        .card-content { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; }
        .emirate-badge { display: inline-block; background: var(--primary-color); color: var(--text-dark); padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.6rem; width: fit-content; }
        .card-title { font-size: 1.25rem; font-weight: 700; color: var(--text-dark); margin-bottom: 0.5rem; }
        .card-description { color: #666; font-size: 0.9rem; line-height: 1.6; margin-bottom: 1rem; flex-grow: 1; }
        
        .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; border-top: 1px solid var(--border-color); margin-top: auto; }
        .view-btn { background: var(--secondary-color); color: white; border: none; padding: 0.5rem 1.2rem; border-radius: 20px; cursor: pointer; font-weight: 600; transition: background 0.3s ease; font-family: 'Cairo', sans-serif; font-size: 0.85rem; }
        .view-btn:hover { background: var(--accent-color); }
        .location-info { font-size: 0.85rem; color: #777; display: flex; align-items: center; gap: 0.3rem; }

        .emirates-info { background: linear-gradient(135deg, var(--secondary-color) 0%, #0d3a1a 100%); color: white; padding: 2.5rem 2rem; text-align: center; }
        .emirates-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1.5rem; }
        .emirate-item h3 { color: var(--primary-color); margin-bottom: 0.3rem; font-size: 1.2rem; }
        .emirate-item p { font-size: 0.85rem; opacity: 0.8; }
        footer { background: var(--text-dark); color: white; padding: 1.5rem; text-align: center; font-size: 0.9rem; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); overflow-y: auto; padding: 1rem; }
        .modal-content { background-color: white; margin: 5% auto; padding: 2rem; border-radius: 15px; width: 100%; max-width: 700px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .close { color: #aaa; position: absolute; top: 1rem; left: 1.5rem; font-size: 2rem; font-weight: bold; cursor: pointer; transition: color 0.2s; }
        html[dir="ltr"] .close { left: auto; right: 1.5rem; }
        .close:hover { color: var(--accent-color); }
        
        .modal-emirate { display: inline-block; background: var(--primary-color); color: var(--text-dark); padding: 0.4rem 1rem; border-radius: 20px; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.5rem; }
        .modal h2 { color: var(--secondary-color); margin-bottom: 0.5rem; }
        .modal-category { font-weight: bold; color: var(--accent-color); margin-bottom: 1rem; font-size: 0.95rem; }
        .modal-description { color: #444; line-height: 1.7; margin-bottom: 1.5rem; font-size: 1rem; }
        
        .modal-activities, .modal-location { background: var(--bg-light); padding: 1.2rem; border-radius: 10px; margin-bottom: 1rem; }
        .modal-activities h4, .modal-location h4 { color: var(--secondary-color); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .modal-activities ul { list-style: none; }
        .modal-activities li { padding: 0.3rem 0; display: flex; align-items: center; gap: 0.5rem; }
        .modal-activities li::before { content: "✓"; color: #007A4D; font-weight: bold; }
        
        .maps-btn { display: inline-flex; align-items: center; gap: 0.5rem; background: #007A4D; color: white; padding: 0.6rem 1.2rem; border-radius: 25px; text-decoration: none; font-weight: 600; margin-top: 0.5rem; transition: background 0.2s; font-size: 0.9rem; }
        .maps-btn:hover { background: #1a472a; }

        @media (max-width: 768px) {
            header { height: auto; padding: 1rem 0; }
            html[dir="rtl"] header::before, html[dir="ltr"] header::before { background: linear-gradient(135deg, #CE1126, #007A4D, #000000); }
            .header-container { flex-direction: column; gap: 1rem; text-align: center; }
            nav ul { gap: 1rem; }
            .hero h1 { font-size: 2.2rem; }
            .search-box { flex-direction: column; border-radius: 20px; }
            .search-box button { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo" id="logoText">وجهتي</div>
            <nav>
                <ul>
                    <li><a href="#home" id="navHome">الرئيسية</a></li>

    <section class="hero" id="home">

            <div class="search-box">

                <input type="text" id="searchInput" placeholder="ابحث عن وجهة...">
                <button onclick="filterDestinations()" id="searchBtn">ابحث</button>

        </div>
    </section>

    <section class="filter-section" id="destinations">

    <section class="emirates-info">

    <footer>

            <p>© 2026 <span id="footerText">وجهتي - جميع الحقوق محفوظة</span></p>
        </div>

            <div class="modal-location">

                    <i class="fas fa-directions"></i> <span id="modalMapsBtnText">عرض على الخريطة</span>
                </a>
            </div>
        </div>
    </div>

                desc: { ar: "حديقة عامة عائلية فسيحة تضم ينابيع مياه دافئة طبيعية تحتوي على معادن كبريتية شافية وممتازة للصحة.", en: "A spacious public family park built around natural mineral-rich thermal healing springs." },
                activities: { ar: ["الاستجمام والسباحة في المسابح المخصصة للمياه الكبريتية الشافية", "الاسترخاء والشواء في الساحات العشبية الخضراء الفسيحة المظللة"], en: ["Swim in dedicated public pools fed by thermal healing springs", "Relax and have a barbecue lunch on wide shaded grass lawns"] },
                location: { ar: "منطقة مضب، غرب مدينة الفجيرة", en: "Madhab, Fujairah" }, maps: "https://maps.google.com/?q=Madhab+Sulphur+Spring+Park"
            }
        ];

        const emiratesList = {
            ar: ["أبوظبي", "دبي", "الشارقة", "عجمان", "أم القيوين", "رأس الخيمة", "الفجيرة"],
            en: ["Abu Dhabi", "Dubai", "Sharjah", "Ajman", "Umm Al Quwain", "Ras Al Khaimah", "Fujairah"]
        };

        const categoriesList = {
            ar: ["الكل", "معالم تاريخية", "طبيعة وشواطئ", "ترفيه وألعاب", "متاحف"],
            en: ["All", "Historical Landmarks", "Nature & Beaches", "Entertainment & Games", "Museums"]
        };

        let selectedCategory = 'الكل';

        function updateUI() {
            const lang = currentLang;
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            document.getElementById('pageTitle').innerText = translations[lang].title;
            document.getElementById('logoText').innerText = translations[lang].logo;
            document.getElementById('navHome').innerText = translations[lang].home;
            document.getElementById('navDestinations').innerText = translations[lang].destinations;
            document.getElementById('heroTitle').innerText = translations[lang].heroTitle;
            document.getElementById('heroDesc').innerText = translations[lang].heroDesc;
            document.getElementById('searchInput').placeholder = translations[lang].searchPlaceholder;
            document.getElementById('searchBtn').innerText = translations[lang].searchBtn;
            document.getElementById('footerText').innerText = translations[lang].footer;
            document.querySelector('.lang-btn').innerText = lang === 'ar' ? 'English' : 'العربية';

            const emirateFilter = document.getElementById('emirateFilter');
            emirateFilter.innerHTML = `<option value="">${translations[lang].allEmirates}</option>`;
            emiratesList[lang].forEach((em, idx) => {
                emirateFilter.innerHTML += `<option value="${emiratesList['ar'][idx]}">${em}</option>`;
            });

            const categoryContainer = document.getElementById('categoryFilterContainer');
            categoryContainer.innerHTML = '';
            categoriesList[lang].forEach((cat, idx) => {
                const catKeyAr = categoriesList['ar'][idx];
                const isActive = selectedCategory === catKeyAr ? 'active' : '';
                categoryContainer.innerHTML += `<button class="filter-btn ${isActive}" onclick="filterByCategory('${catKeyAr}', this)">${cat}</button>`;
            });

            const emiratesGridSummary = document.getElementById('emiratesGridSummary');
            emiratesGridSummary.innerHTML = '';
            emiratesList[lang].forEach((em, idx) => {
                emiratesGridSummary.innerHTML += `
                    <div class="emirate-item">
                        <h3>${em}</h3>
                        <p>10 ${translations[lang].destSuffix}</p>
                    </div>
                `;
            });

            renderDestinations();
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            updateUI();
        }

        function filterByCategory(catAr, btn) {
            selectedCategory = catAr;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderDestinations();
        }

        function filterDestinations() {
            renderDestinations();
        }

        function renderDestinations() {
            const grid = document.getElementById('destinationsGrid');
            grid.innerHTML = '';

            const selectedEmirateAr = document.getElementById('emirateFilter').value;
            const searchKeyword = document.getElementById('searchInput').value.toLowerCase();

            destinationsData.forEach(dest => {
                if (selectedCategory !== 'الكل' && dest.category.ar !== selectedCategory) return;
                if (selectedEmirateAr && dest.emirate.ar !== selectedEmirateAr) return;
                
                const nameText = dest.name[currentLang].toLowerCase();
                const descText = dest.desc[currentLang].toLowerCase();
                if (searchKeyword && !nameText.includes(searchKeyword) && !descText.includes(searchKeyword)) return;

                const card = document.createElement('div');
                card.className = 'destination-card';
                card.onclick = () => openModal(dest);

                card.innerHTML = `
                    <div class="flag-card-bg">
                        <div class="flag-red"></div>
                        <div class="flag-stripes">
                            <div class="stripe-green"></div>
                            <div class="stripe-white"></div>
                            <div class="stripe-black"></div>
                        </div>
                        <div class="flag-icon">${dest.emoji}</div>
                    </div>
                    <div class="card-content">
                        <span class="emirate-badge">${dest.emirate[currentLang]}</span>
                        <h3 class="card-title">${dest.name[currentLang]}</h3>
                        <p class="card-description">${dest.desc[currentLang]}</p>
                        <div class="card-footer">
                            <span class="location-info"><i class="fas fa-map-marker-alt"></i> ${dest.emirate[currentLang]}</span>
                            <button class="view-btn">${translations[currentLang].viewBtn}</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openModal(dest) {
            const lang = currentLang;
            document.getElementById('modalEmirateText').innerText = dest.emirate[lang];
            document.getElementById('modalTitle').innerText = dest.name[lang];
            document.getElementById('modalCategory').innerText = dest.category[lang];
            document.getElementById('modalDescription').innerText = dest.desc[lang];
            
            document.getElementById('modalActTitle').innerHTML = `<i class="fas fa-tasks"></i> ${translations[lang].actTitle}`;
            document.getElementById('modalLocTitle').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${translations[lang].locTitle}`;
            document.getElementById('modalMapsBtnText').innerText = translations[lang].mapsBtn;

            const actList = document.getElementById('modalActivities');
            actList.innerHTML = '';
            dest.activities[lang].forEach(act => {
                actList.innerHTML += `<li>${act}</li>`;
            });

            document.getElementById('modalLocation').innerText = dest.location[lang];
            document.getElementById('mapsLink').href = dest.maps;

            document.getElementById('destinationModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('destinationModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('destinationModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        window.onload = updateUI;
    </script>
</body>
</html>
